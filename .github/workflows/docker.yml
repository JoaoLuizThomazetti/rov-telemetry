name: Build and Push Docker Images

on:
  push:
    branches: [main]

jobs:
  tests-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync
      - name: Test backend
        working-directory: backend
        run: uv run pytest tests/
      - name: Install mavlink-simulator dependencies
        working-directory: mavlink-simulator
        run: uv sync
      - name: Test mavlink-simulator
        working-directory: mavlink-simulator
        run: uv run pytest tests/
      - name: Install vision dependencies
        working-directory: vision
        run: uv sync
      - name: Test vision
        working-directory: vision
        run: uv run pytest tests/

  tests-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            mavlink-bridge
            recorder
      - name: Test mavlink-bridge
        working-directory: mavlink-bridge
        run: cargo test
      - name: Test recorder
        working-directory: recorder
        run: cargo test

  build:
    name: Build images
    needs: [tests-python, tests-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: mavlink-bridge
            context: mavlink-bridge
          - service: mavlink-simulator
            context: mavlink-simulator
          - service: recorder
            context: recorder
          - service: backend
            context: backend
          - service: frontend
            context: frontend
          - service: vision
            context: vision
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ env.OWNER }}/rov-telemetry-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            curl -fsSL "https://raw.githubusercontent.com/JoaoLuizThomazetti/rov-telemetry/main/docker-compose.prod.yml" -o docker-compose.prod.yml
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate
