name: Build and Push Docker Images

on:
  push:
    branches: [main]

jobs:
  tests-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync
      - name: Test backend
        working-directory: backend
        run: uv run pytest tests/
      - name: Install mavlink-simulator dependencies
        working-directory: mavlink-simulator
        run: uv sync
      - name: Test mavlink-simulator
        working-directory: mavlink-simulator
        run: uv run pytest tests/
      - name: Install vision dependencies
        working-directory: vision
        run: uv sync
      - name: Test vision
        working-directory: vision
        run: uv run pytest tests/
      - name: Test telemetry
        working-directory: telemetry
        run: uv run pytest tests/

  tests-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            mavlink-bridge
            recorder
      - name: Test mavlink-bridge
        working-directory: mavlink-bridge
        run: cargo test
      - name: Test recorder
        working-directory: recorder
        run: cargo test

  build:
    name: Build images
    needs: [tests-python, tests-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: mavlink-simulator
            context: .
            dockerfile: mavlink-simulator/Dockerfile
          - service: backend
            context: .
            dockerfile: backend/Dockerfile
          - service: vision
            context: .
            dockerfile: vision/Dockerfile
          - service: telemetry
            context: .
            dockerfile: telemetry/Dockerfile
          - service: mavlink-bridge
            context: mavlink-bridge
            dockerfile: mavlink-bridge/Dockerfile
          - service: recorder
            context: recorder
            dockerfile: recorder/Dockerfile
          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ env.OWNER }}/rov-telemetry-${{ matrix.service }}:latest
          build-args: |
            VITE_TURN_URL=${{ secrets.TURN_URL }}
            VITE_TURN_USER=${{ secrets.TURN_USER }}
            VITE_TURN_PASS=${{ secrets.TURN_PASS }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        env:
          TURN_URL: ${{ secrets.TURN_URL }}
          TURN_USER: ${{ secrets.TURN_USER }}
          TURN_PASS: ${{ secrets.TURN_PASS }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: TURN_URL,TURN_USER,TURN_PASS
          script: |
            printf "TURN_URL=%s\nTURN_USER=%s\nTURN_PASS=%s\n" "$TURN_URL" "$TURN_USER" "$TURN_PASS" > .env
            curl -fsSL "https://raw.githubusercontent.com/JoaoLuizThomazetti/rov-telemetry/main/docker-compose.prod.yml" -o docker-compose.prod.yml
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate
