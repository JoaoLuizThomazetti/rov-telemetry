server {
    listen 80;

    client_max_body_size 200m;
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
    }

    location /recorder/ {
        proxy_pass http://recorder:3000/;
    }

    location /vision/ {
        proxy_pass http://vision:8003/;
    }

    location /simulator/ { 
        proxy_pass http://mavlink-simulator:8001/; 
    }

    location /telemetry/ { 
        proxy_pass http://telemetry:8004/; 
    }

    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /telemetry/ws/ {
        proxy_pass http://telemetry:8004/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
