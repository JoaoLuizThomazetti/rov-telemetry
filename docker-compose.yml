services:
  zenoh-router:
    image: eclipse/zenoh:latest
    networks: [rov-net]

  mavlink-bridge:
    build: ./mavlink-bridge
    environment:
      - MAVLINK_LISTEN=udpin:0.0.0.0:14550
      - ZENOH_CONNECT=tcp/zenoh-router:7447
    networks: [rov-net]
    depends_on: [zenoh-router]

  recorder:
    build: ./recorder
    volumes: [mcap_data:/data]
    environment:
      - MCAP_DIR=/data
      - ZENOH_CONNECT=tcp/zenoh-router:7447
    networks: [rov-net]
    depends_on: [zenoh-router]

  backend:
    build: ./backend
    volumes: [mcap_data:/data]
    environment:
      - MCAP_DIR=/data
      - ZENOH_CONNECT=tcp/zenoh-router:7447
    networks: [rov-net]
    depends_on: [zenoh-router]

  mavlink-simulator:
    build: ./mavlink-simulator
    environment:
      - MAVLINK_TARGET=udpout:mavlink-bridge:14550
      - PYTHONUNBUFFERED=1
    networks: [rov-net]
    depends_on: [mavlink-bridge]

  frontend:
    build: ./frontend
    ports: ["80:80"]
    networks: [rov-net]
    depends_on: [backend]

networks:
  rov-net:

volumes:
  mcap_data: