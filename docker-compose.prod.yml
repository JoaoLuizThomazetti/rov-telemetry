services:
  zenoh-router:
    image: eclipse/zenoh:latest
    networks: [rov-net]

  mavlink-bridge:
    image: ghcr.io/joaoluizthomazetti/rov-telemetry-mavlink-bridge:latest
    environment:
      - ZENOH_CONNECT=tcp/zenoh-router:7447
    networks: [rov-net]
    depends_on: [zenoh-router]

  recorder:
    image: ghcr.io/joaoluizthomazetti/rov-telemetry-recorder:latest
    volumes: [mcap_data:/data]
    environment:
      - MCAP_DIR=/data
      - ZENOH_CONNECT=tcp/zenoh-router:7447
    networks: [rov-net]
    depends_on: [zenoh-router]

  backend:
    image: ghcr.io/joaoluizthomazetti/rov-telemetry-backend:latest
    volumes: [mcap_data:/data]
    environment:
      - MCAP_DIR=/data
      - ZENOH_CONNECT=tcp/zenoh-router:7447
    networks: [rov-net]
    depends_on: [zenoh-router]

  vision:
    image: ghcr.io/joaoluizthomazetti/rov-telemetry-vision:latest
    volumes: [vision_videos:/videos]
    environment:
      - VIDEO_DIR=/videos
    network_mode: host

  mavlink-simulator:
    image: ghcr.io/joaoluizthomazetti/rov-telemetry-mavlink-simulator:latest
    environment:
      - MAVLINK_TARGET=udpout:mavlink-bridge:14550
    networks: [rov-net]
    depends_on: [mavlink-bridge]

  frontend:
    image: ghcr.io/joaoluizthomazetti/rov-telemetry-frontend:latest
    ports: ["127.0.0.1:8888:80"]
    networks: [rov-net]
    depends_on: [backend]

networks:
  rov-net:

volumes:
  mcap_data:
  vision_videos: